services:
  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - p3_mongo_data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mongodb://db:27017/p3
      JWT_SECRET: replace_with_a_long_random_secret
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:5173
      SEED_ADMIN: "true"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin_password_123
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  p3_mongo_data:

